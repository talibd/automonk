version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: automonk-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
    networks:
      - automonk

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: automonk-worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - ./assets:/app/assets
    networks:
      - automonk

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: automonk-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    networks:
      - automonk

  postgres:
    image: postgres:16-alpine
    container_name: automonk-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - automonk

  redis:
    image: redis:7-alpine
    container_name: automonk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - automonk

  minio:
    image: minio/minio:latest
    container_name: automonk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - automonk

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  automonk:
    driver: bridge
