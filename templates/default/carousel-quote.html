<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      background: #0D0F14;
      font-family: 'Inter', 'Helvetica Neue', 'Arial', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Subtle radial glow top-right */
    body::before {
      content: '';
      position: absolute;
      top: -180px;
      right: -180px;
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(99,102,241,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Bottom-left glow */
    body::after {
      content: '';
      position: absolute;
      bottom: -120px;
      left: -120px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139,92,246,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 52px 64px 0;
      position: relative;
      z-index: 1;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
      border: 2px solid rgba(99,102,241,0.35);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.08);
    }

    .client-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .client-name {
      font-size: 22px;
      font-weight: 650;
      color: #F1F5F9;
      letter-spacing: -0.5px;
    }

    .post-title {
      font-size: 14px;
      color: #475569;
      font-weight: 400;
      letter-spacing: 0.1px;
    }

    /* ── Accent bar ─────────────────────────────────────── */
    .accent-bar {
      width: 52px;
      height: 4px;
      background: linear-gradient(90deg, #6366F1, #8B5CF6);
      margin: 40px 64px 0;
      border-radius: 2px;
      position: relative;
      z-index: 1;
    }

    /* ── Quote area ─────────────────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 28px 64px 20px;
      position: relative;
      z-index: 1;
    }

    .quote-mark {
      font-size: 160px;
      color: #6366F1;
      line-height: 0.45;
      margin-bottom: 44px;
      font-family: 'Georgia', 'Times New Roman', serif;
      opacity: 0.20;
      user-select: none;
      letter-spacing: -4px;
    }

    .quote-text {
      font-size: 62px;
      font-weight: 750;
      color: #F1F5F9;
      line-height: 1.18;
      letter-spacing: -2px;
    }

    /* ── Footer ─────────────────────────────────────────── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 64px 52px;
      position: relative;
      z-index: 1;
    }

    .slide-counter {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      color: #1E293B;
      letter-spacing: 3px;
    }

    .brand-dots {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .dot {
      border-radius: 50%;
      background: #6366F1;
    }

    .dot-sm {
      width: 5px;
      height: 5px;
      opacity: 0.35;
    }

    .dot-lg {
      width: 9px;
      height: 9px;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="avatar">{{AVATAR_CONTENT}}</div>
    <div class="client-info">
      <span class="client-name">{{CLIENT_NAME}}</span>
      <span class="post-title">{{TITLE}}</span>
    </div>
  </header>

  <div class="accent-bar"></div>

  <main class="content">
    <div class="quote-mark">&#8220;</div>
    <p class="quote-text">{{QUOTE}}</p>
  </main>

  <footer class="footer">
    <span class="slide-counter">{{SLIDE_NUMBER}} / {{TOTAL_SLIDES}}</span>
    <div class="brand-dots">
      <div class="dot dot-sm"></div>
      <div class="dot dot-lg"></div>
    </div>
  </footer>

</body>
</html>
