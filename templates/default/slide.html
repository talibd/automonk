<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1080px;
      background: #0D0F14;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px;
      font-family: 'Geist', 'Inter', 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .slide-number {
      position: absolute;
      top: 40px;
      right: 50px;
      font-size: 28px;
      color: #6366F1;
      font-weight: 700;
      letter-spacing: 2px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }

    .accent-bar {
      width: 80px;
      height: 6px;
      background: #6366F1;
      border-radius: 3px;
      margin-bottom: 40px;
      align-self: flex-start;
    }

    .headline {
      font-size: 68px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1.1;
      letter-spacing: -1px;
      align-self: flex-start;
      margin-bottom: 36px;
    }

    .body {
      font-size: 36px;
      font-weight: 400;
      color: #94A3B8;
      line-height: 1.5;
      align-self: flex-start;
    }

    .brand-dot {
      position: absolute;
      bottom: 40px;
      right: 50px;
      width: 20px;
      height: 20px;
      background: #6366F1;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="slide-number">{{SLIDE_NUMBER}}/10</div>

  <div class="accent-bar"></div>
  <h1 class="headline">{{HEADLINE}}</h1>
  <p class="body">{{BODY}}</p>

  <div class="brand-dot"></div>
</body>
</html>
